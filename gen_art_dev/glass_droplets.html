<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Glass Droplets — Generative Art</title>
  <style>
    :root {
      --bg:         #0c0c0c;
      --surface:    #161616;
      --surface2:   #202020;
      --border:     #2e2e2e;
      --text:       #c8c8c8;
      --text-dim:   #555;
      --accent:     #5ecec6;
      --accent-dim: #1d4d4a;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', monospace;
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      display: flex; align-items: center; gap: 14px;
      padding: 11px 18px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    header h1 { font-size: 14px; font-weight: 600; color: var(--accent); letter-spacing: 0.06em; }
    header .subtitle { font-size: 12px; color: var(--text-dim); }

    .layout { display: flex; flex: 1; min-height: 0; overflow: hidden; }

    .controls {
      width: 295px; flex-shrink: 0;
      overflow-y: auto;
      border-right: 1px solid var(--border);
      padding: 10px;
      display: flex; flex-direction: column; gap: 6px;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    .group { border: 1px solid var(--border); border-radius: 5px; }

    .group-header {
      padding: 6px 10px; background: var(--surface2);
      font-size: 11px; font-weight: 700; letter-spacing: 0.10em;
      text-transform: uppercase; color: var(--text-dim);
      cursor: pointer; display: flex; justify-content: space-between;
      align-items: center; user-select: none;
      transition: color 0.15s; border-radius: 4px 4px 0 0;
    }
    .group-header:hover { color: var(--text); }
    .group.collapsed .group-header { border-radius: 4px; }
    .group.collapsed .caret { transform: rotate(-90deg); }
    .group.collapsed .group-body { display: none; }
    .caret { display: inline-block; transition: transform 0.18s; }

    .group-body {
      padding: 8px; display: flex; flex-direction: column; gap: 10px;
      overflow-y: auto; max-height: 260px;
      scrollbar-width: thin; scrollbar-color: var(--border) transparent;
      border-radius: 0 0 4px 4px;
    }

    .param { display: flex; flex-direction: column; gap: 3px; }
    .param-label { display: flex; justify-content: space-between; align-items: baseline; font-size: 12px; }
    .param-name { color: var(--text); }
    .param-value { color: var(--accent); font-size: 11px; min-width: 36px; text-align: right; }

    input[type="range"] {
      -webkit-appearance: none; appearance: none;
      width: 100%; height: 2px;
      background: var(--border); border-radius: 1px; outline: none; cursor: pointer;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 11px; height: 11px; border-radius: 50%;
      background: var(--accent); cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }
    input[type="range"]::-webkit-slider-thumb:hover { background: #fff; transform: scale(1.2); }
    input[type="range"]::-moz-range-thumb {
      width: 11px; height: 11px; border: none; border-radius: 50%;
      background: var(--accent); cursor: pointer;
    }

    .preview { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: var(--bg); }

    .svg-wrapper {
      flex: 1; display: flex; align-items: center; justify-content: center;
      padding: 24px; overflow: hidden; cursor: grab; user-select: none;
    }
    .svg-wrapper.dragging { cursor: grabbing; }
    #zoom-layer { transform-origin: center center; flex-shrink: 0; }
    #canvas {
      background: #fff; border-radius: 2px;
      box-shadow: 0 4px 48px rgba(0,0,0,0.75);
      display: block; flex-shrink: 0;
    }

    .preset-row { display: flex; gap: 5px; margin-bottom: 2px; }
    .preset-btn { flex: 1; padding: 4px 6px; font-size: 11px; min-width: 0; }
    .preset-btn.active { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }
    #zoom-label { font-size: 11px; color: var(--text-dim); min-width: 38px; }

    .toolbar {
      border-top: 1px solid var(--border); padding: 9px 16px;
      display: flex; align-items: center; gap: 10px;
      flex-shrink: 0; flex-wrap: wrap;
    }
    .seed-label { font-size: 11px; color: var(--text-dim); }
    #seed-input {
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--text); font-family: inherit; font-size: 12px;
      padding: 5px 8px; border-radius: 4px; width: 90px;
      outline: none; transition: border-color 0.15s;
    }
    #seed-input:focus { border-color: var(--accent); }

    button {
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--text); font-family: inherit; font-size: 12px;
      padding: 6px 14px; border-radius: 4px; cursor: pointer;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
      white-space: nowrap;
    }
    button:hover { border-color: var(--accent); color: var(--accent); }
    #download-btn { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); margin-left: auto; }
    #download-btn:hover { background: var(--accent); color: #000; }
    .render-time { font-size: 10px; color: var(--text-dim); }
  </style>
</head>
<body>

<header>
  <h1>GLASS DROPLETS</h1>
  <span class="subtitle">rain on a window — generative plotter art</span>
</header>

<div class="layout">
  <aside class="controls" id="controls"></aside>
  <main class="preview">
    <div class="svg-wrapper" id="svg-wrapper">
      <div id="zoom-layer">
        <svg id="canvas" xmlns="http://www.w3.org/2000/svg"></svg>
      </div>
    </div>
    <div class="toolbar">
      <span class="seed-label">seed</span>
      <input type="number" id="seed-input" value="42" min="0" max="99999999">
      <button id="randomize-btn">⚡ randomize</button>
      <button id="rerender-btn">↺ re-render</button>
      <span class="render-time" id="render-time"></span>
      <button id="zoom-reset-btn">⊙ reset zoom</button>
      <span id="zoom-label">100%</span>
      <button id="download-btn">↓ save SVG</button>
    </div>
  </main>
</div>

<script>
// ── Seeded PRNG (mulberry32) ──────────────────────────────────────────────────
function makePRNG(seed) {
  let s = seed >>> 0;
  const rand = () => {
    s = (s + 0x6D2B79F5) >>> 0;
    let t = Math.imul(s ^ (s >>> 15), 1 | s);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 0x100000000;
  };
  rand.uniform = (a, b) => a + rand() * (b - a);
  rand.gauss = () => {
    const u = Math.max(rand(), 1e-12);
    return Math.sqrt(-2 * Math.log(u)) * Math.cos(2 * Math.PI * rand());
  };
  // Exponential: −ln(U) / rate
  rand.expo = (rate) => -Math.log(Math.max(rand(), 1e-12)) / rate;
  return rand;
}

// ── Schema ────────────────────────────────────────────────────────────────────
const ARTWORK_NAME = 'glass-droplets';

const SCHEMA = [
  {
    group: 'Canvas',
    presets: [
      { label: 'A4',     w: 210, h: 297 },
      { label: 'A3',     w: 297, h: 420 },
      { label: 'Square', w: 200, h: 200 },
    ],
    items: [
      { id: 'width',  label: 'Width (mm)',  min: 60,  max: 420, step: 5, def: 210 },
      { id: 'height', label: 'Height (mm)', min: 60,  max: 594, step: 5, def: 297 },
    ],
  },
  {
    group: 'Population',
    items: [
      { id: 'numDrops',      label: 'Total drops',      min: 5,  max: 150, step: 1,    def: 50   },
      { id: 'slideFraction', label: 'Sliding fraction', min: 0,  max: 1,   step: 0.05, def: 0.25 },
    ],
  },
  {
    group: 'Physics',
    items: [
      { id: 'dropLength',   label: 'Trail length (mm)', min: 5,   max: 180, step: 5,    def: 45   },
      { id: 'windAngle',    label: 'Wind angle (°)',    min: -45, max: 45,  step: 1,    def: 5    },
      { id: 'windStrength', label: 'Wind strength',     min: 0,   max: 1,   step: 0.05, def: 0.25 },
      { id: 'heaviness',    label: 'Heaviness',         min: 0.5, max: 15,  step: 0.5,  def: 5.0  },
      { id: 'viscosity',    label: 'Viscosity',         min: 0,   max: 1,   step: 0.05, def: 0.30 },
      { id: 'randomness',   label: 'Randomness',        min: 0,   max: 1,   step: 0.05, def: 0.15 },
    ],
  },
  {
    group: 'Rings',
    items: [
      { id: 'ringCount',  label: 'Ring count',  min: 1, max: 20, step: 1,    def: 5    },
      { id: 'ringWarp',   label: 'Ring warp',   min: 0, max: 3,  step: 0.05, def: 0.40 },
      { id: 'distortion', label: 'Distortion',  min: 0, max: 3,  step: 0.05, def: 0.20 },
    ],
  },
  {
    group: 'Satellites',
    items: [
      { id: 'fractalDepth', label: 'Fractal depth', min: 0, max: 4, step: 1, def: 1 },
    ],
  },
];

// ── Boilerplate ───────────────────────────────────────────────────────────────
const state = {};
SCHEMA.forEach(g => g.items.forEach(p => { state[p.id] = p.def; }));

const controlsEl = document.getElementById('controls');
const sliders = {}, valEls = {};
let presetBtns = [];

SCHEMA.forEach(({ group, items, presets }) => {
  const groupEl = document.createElement('div');
  groupEl.className = 'group';
  const hdr = document.createElement('div');
  hdr.className = 'group-header';
  hdr.innerHTML = `${group} <span class="caret">▾</span>`;
  hdr.addEventListener('click', () => groupEl.classList.toggle('collapsed'));
  const body = document.createElement('div');
  body.className = 'group-body';

  if (presets) {
    const row = document.createElement('div');
    row.className = 'preset-row';
    presets.forEach(({ label, w, h }) => {
      const btn = document.createElement('button');
      btn.className = 'preset-btn';
      btn.textContent = label;
      presetBtns.push({ btn, w, h });
      btn.addEventListener('click', () => {
        state.width = w; state.height = h;
        sliders.width.value = w; sliders.height.value = h;
        valEls.width.textContent = String(w);
        valEls.height.textContent = String(h);
        updateActivePreset(); render();
      });
      row.appendChild(btn);
    });
    body.appendChild(row);
  }

  items.forEach(param => {
    const wrap = document.createElement('div'); wrap.className = 'param';
    const row  = document.createElement('div'); row.className = 'param-label';
    const nameEl = document.createElement('span'); nameEl.className = 'param-name'; nameEl.textContent = param.label;
    const valEl  = document.createElement('span'); valEl.className = 'param-value';
    valEl.id = `val-${param.id}`; valEl.textContent = formatVal(param.def, param.step);
    valEls[param.id] = valEl;
    row.append(nameEl, valEl);
    const slider = document.createElement('input');
    slider.type = 'range'; slider.min = param.min; slider.max = param.max;
    slider.step = param.step; slider.value = param.def;
    sliders[param.id] = slider;
    slider.addEventListener('input', () => {
      const v = parseFloat(slider.value);
      state[param.id] = v;
      valEl.textContent = formatVal(v, param.step);
      if (param.id === 'width' || param.id === 'height') updateActivePreset();
      scheduleRender();
    });
    wrap.append(row, slider); body.append(wrap);
  });

  groupEl.append(hdr, body); controlsEl.append(groupEl);
});

function updateActivePreset() {
  presetBtns.forEach(({ btn, w, h }) =>
    btn.classList.toggle('active', state.width === w && state.height === h));
}
updateActivePreset();

function formatVal(v, step) {
  if (step >= 1) return String(Math.round(v));
  const decimals = String(step).split('.')[1]?.length ?? 2;
  return v.toFixed(Math.min(decimals, 3));
}

const NS    = 'http://www.w3.org/2000/svg';
const svgEl = document.getElementById('canvas');
function svgEl_(tag, attrs) {
  const e = document.createElementNS(NS, tag);
  for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
  return e;
}

// ── render() ─────────────────────────────────────────────────────────────────
function render() {
  const t0   = performance.now();
  const p    = state;
  const seed = Math.max(0, parseInt(document.getElementById('seed-input').value) || 0);
  const rand = makePRNG(seed);

  const margin = 2;
  const vw = p.width + 2 * margin, vh = p.height + 2 * margin;
  const ox = margin, oy = margin;
  const W = p.width, H = p.height;

  svgEl.setAttribute('viewBox', `0 0 ${vw} ${vh}`);
  while (svgEl.firstChild) svgEl.removeChild(svgEl.lastChild);

  function addPolyline(pts, sw) {
    if (pts.length < 2) return;
    const d = pts.map(([x, y]) =>
      `${(ox + x).toFixed(2)},${(oy + y).toFixed(2)}`
    ).join(' ');
    svgEl.appendChild(svgEl_('polyline', {
      points: d, fill: 'none', stroke: 'black',
      'stroke-width': sw != null ? sw : 0.5,
      'stroke-linecap': 'round', 'stroke-linejoin': 'round',
    }));
  }

  // ── Path simulation ────────────────────────────────────────────────────────
  function simPath(x0, y0, windVx) {
    const path = [[x0, y0]];
    let x = x0, y = y0, vx = windVx, vy = 0.05;
    const dt       = 0.5;
    const maxSteps = Math.floor(p.dropLength * 2.5 / dt);
    const gravity  = 0.08 * (p.heaviness / 5.0);
    const drag     = 0.85 + p.viscosity * 0.12;

    for (let i = 0; i < maxSteps; i++) {
      vy += gravity * dt;
      vx += windVx * 0.008 * dt + rand.gauss() * p.randomness * 0.10 * dt;
      vy += rand.gauss() * p.randomness * 0.015 * dt;
      vx *= drag; vy *= drag;
      const spd    = Math.sqrt(vx * vx + vy * vy);
      const maxSpd = 1.5 * (1.0 - p.viscosity * 0.6);
      if (spd > maxSpd) { vx = vx / spd * maxSpd; vy = vy / spd * maxSpd; }
      x += vx * dt; y += vy * dt;
      if (y > H * 0.97 || x < -W * 0.1 || x > W * 1.1) break;
      path.push([x, y]);
    }
    return path;
  }

  // ── Path smoothing (Laplacian) ─────────────────────────────────────────────
  function smoothPath(path, iters) {
    let p2 = path;
    for (let iter = 0; iter < iters; iter++) {
      const s = [p2[0]];
      for (let i = 1; i < p2.length - 1; i++) {
        s.push([
          0.25 * p2[i-1][0] + 0.5 * p2[i][0] + 0.25 * p2[i+1][0],
          0.25 * p2[i-1][1] + 0.5 * p2[i][1] + 0.25 * p2[i+1][1],
        ]);
      }
      s.push(p2[p2.length - 1]);
      p2 = s;
    }
    return p2;
  }

  // ── Ring drawing ───────────────────────────────────────────────────────────
  //
  // Warp model: 3 low-frequency sine harmonics (freqs 2, 3, 5) with random
  // per-ring phases → smooth organic blobs, NOT spiky jagged flowers.
  // Tiny Gaussian noise on top for fine texture.
  //
  // Teardrop: v < 0 (trailing edge) is elongated proportional to speed.
  //           At speed = 0 (static beads) → pure circles + smooth warp.
  //
  const WARP_FREQS = [2, 3, 5];

  function drawRings(cx, cy, r, motionAngle, speed, rngSeed, nRings) {
    const rng  = makePRNG(rngSeed);
    const cosA = Math.cos(motionAngle);
    const sinA = Math.sin(motionAngle);
    const maxElong = 1.0 + speed * Math.max(0, 1.5 - p.viscosity * 1.2);

    for (let ri = 0; ri < nRings; ri++) {
      const t      = (ri + 1) / nRings;
      const ringR  = r * t;
      const nPts   = Math.max(24, Math.floor(72 * t));

      const warpAmp = p.ringWarp * ringR * 0.10;
      const phases  = WARP_FREQS.map(() => rng.uniform(0, 2 * Math.PI));

      const pts = [];
      for (let j = 0; j < nPts; j++) {
        const theta = 2 * Math.PI * j / nPts;
        const u = Math.cos(theta);
        const v = Math.sin(theta);

        // Smooth sine-wave warp on radius
        let warpR = 0;
        for (let k = 0; k < WARP_FREQS.length; k++) {
          warpR += warpAmp * Math.sin(WARP_FREQS[k] * theta + phases[k]);
        }
        // Tiny Gaussian noise for fine texture
        warpR += rng.gauss() * p.distortion * ringR * 0.04;

        const rEff = ringR + warpR;

        // Teardrop elongation
        const vShaped = v < 0
          ? v * (1.0 + Math.abs(v) * (maxElong - 1.0))
          : v * (1.0 - v * 0.05);

        const lx = rEff * u;
        const ly = rEff * vShaped;

        pts.push([
          cx + lx * (-sinA) + ly * cosA,
          cy + lx *  cosA   + ly * sinA,
        ]);
      }
      pts.push(pts[0]); // close
      addPolyline(pts);
    }
  }

  // ── Trail ─────────────────────────────────────────────────────────────────
  function drawTrail(path) {
    if (path.length >= 2) addPolyline(path, 0.30);
  }

  // ── Satellites ─────────────────────────────────────────────────────────────
  function drawSatellites(path, parentR, depth) {
    if (depth <= 0 || path.length === 0) return;
    const nSats  = Math.max(1, Math.floor(rand.uniform(1, p.fractalDepth + 2)));
    const nRings = Math.round(p.ringCount);

    for (let s = 0; s < nSats; s++) {
      const idx     = Math.min(Math.floor(rand.uniform(0, path.length)), path.length - 1);
      const [px, py] = path[idx];

      let perpX = 1, perpY = 0;
      if (idx + 1 < path.length) {
        const dx = path[idx + 1][0] - px, dy = path[idx + 1][1] - py;
        const l  = Math.sqrt(dx * dx + dy * dy) || 1;
        perpX = -dy / l; perpY = dx / l;
      }

      const satR = parentR * rand.uniform(0.15, 0.45) / depth;
      if (satR < 0.2) continue;

      const side    = rand() > 0.5 ? 1 : -1;
      const offsetD = parentR * rand.uniform(0.8, 2.5);
      const sx = px + perpX * offsetD * side + rand.gauss() * satR * 0.3;
      const sy = py + perpY * offsetD * side + rand.gauss() * satR * 0.2;

      const satRings = Math.max(2, nRings - (p.fractalDepth - depth + 1));
      const satSeed  = Math.floor(rand() * 99999);
      drawRings(sx, sy, satR, Math.PI / 2, 0.0, satSeed, satRings);

      if (depth > 1 && rand() < 0.4) drawSatellites([[sx, sy]], satR, depth - 1);
    }
  }

  // ── Main loop ─────────────────────────────────────────────────────────────
  const nDrops       = Math.round(p.numDrops);
  const nRings       = Math.round(p.ringCount);
  const fractalDepth = Math.round(p.fractalDepth);

  // Single global wind direction (all drops share it)
  const windRad     = p.windAngle * Math.PI / 180;
  const baseWindVx  = Math.sin(windRad) * p.windStrength * 2.0;

  for (let di = 0; di < nDrops; di++) {
    const isSliding = rand() < p.slideFraction;
    const rngSeed   = di * 997 + seed % 10000;

    let r, x0, y0;

    if (isSliding) {
      // Sliding drops: lognormal, shifted larger, start upper 55%
      r  = Math.max(1.0, Math.exp(rand.gauss() * 0.45 + 0.4) * p.heaviness / 5.0);
      r  = Math.min(r, p.heaviness);
      x0 = rand.uniform(W * 0.05, W * 0.95);
      y0 = rand.uniform(H * 0.03, H * 0.55);
    } else {
      // Static beads: exponential distribution (many tiny, few large), whole canvas
      const rate = 2.5 / Math.max(0.1, p.heaviness);
      r  = Math.max(0.3, rand.expo(rate));
      r  = Math.min(r, p.heaviness * 0.6);
      x0 = rand.uniform(W * 0.03, W * 0.97);
      y0 = rand.uniform(H * 0.03, H * 0.97);
    }

    if (isSliding) {
      const windVx = baseWindVx * rand.uniform(0.75, 1.25);
      let path = simPath(x0, y0, windVx);
      if (path.length < 4) continue;
      path = smoothPath(path, 4);

      const trailPath = path.length > 4 ? path.slice(0, -2) : path;
      drawTrail(trailPath);

      const head     = path[path.length - 1];
      const lookBack = Math.min(5, path.length - 1);
      const prev     = path[path.length - 1 - lookBack];
      const dx = head[0] - prev[0], dy = head[1] - prev[1];
      drawRings(head[0], head[1], r, Math.atan2(dy, dx),
                Math.sqrt(dx * dx + dy * dy) / lookBack,
                rngSeed, nRings);

      if (fractalDepth > 0) drawSatellites(trailPath, r, fractalDepth);

    } else {
      // Static bead: speed = 0 → circular rings + smooth warp only
      drawRings(x0, y0, r, Math.PI / 2, 0.0, rngSeed, nRings);
    }
  }

  fitSvg();
  document.getElementById('render-time').textContent =
    `${(performance.now() - t0).toFixed(1)} ms`;
}

// ── Boilerplate: fit, zoom/pan, toolbar ──────────────────────────────────────
const wrapper = document.querySelector('.svg-wrapper');

function fitSvg() {
  const vbAttr = svgEl.getAttribute('viewBox');
  if (!vbAttr) return;
  const [, , vw, vh] = vbAttr.split(' ').map(Number);
  const pad = 24, availW = wrapper.clientWidth - pad*2, availH = wrapper.clientHeight - pad*2;
  const aspect = vw / vh;
  let dW, dH;
  if (availW / availH > aspect) { dH = availH; dW = availH * aspect; }
  else                          { dW = availW; dH = availW / aspect; }
  svgEl.style.width = `${Math.floor(dW)}px`;
  svgEl.style.height = `${Math.floor(dH)}px`;
}

new ResizeObserver(fitSvg).observe(wrapper);
let timer = null;
function scheduleRender() { clearTimeout(timer); timer = setTimeout(render, 55); }

document.getElementById('randomize-btn').addEventListener('click', () => {
  document.getElementById('seed-input').value = Math.floor(Math.random() * 9_999_999);
  render();
});
document.getElementById('rerender-btn').addEventListener('click', render);
document.getElementById('seed-input').addEventListener('change', render);
document.getElementById('seed-input').addEventListener('keydown', e => { if (e.key === 'Enter') render(); });

document.getElementById('download-btn').addEventListener('click', () => {
  const seed  = document.getElementById('seed-input').value;
  const clone = svgEl.cloneNode(true);
  clone.setAttribute('width',  `${state.width  + 4}mm`);
  clone.setAttribute('height', `${state.height + 4}mm`);
  const bg = document.createElementNS(NS, 'rect');
  bg.setAttribute('width', '100%'); bg.setAttribute('height', '100%');
  bg.setAttribute('fill', 'white');
  clone.insertBefore(bg, clone.firstChild);
  clone.setAttribute('xmlns', NS);
  const blob = new Blob(
    [`<?xml version="1.0" encoding="UTF-8"?>\n<!-- ${ARTWORK_NAME} | seed=${seed} -->\n`, clone.outerHTML],
    { type: 'image/svg+xml' }
  );
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `${ARTWORK_NAME}-s${seed}.svg`;
  a.click();
  URL.revokeObjectURL(a.href);
});

const svgWrapper = document.getElementById('svg-wrapper');
const zoomLayer  = document.getElementById('zoom-layer');
const zoomLabel  = document.getElementById('zoom-label');
let zoom = 1, pan = { x: 0, y: 0 };

function applyTransform() {
  zoomLayer.style.transform = `translate(${pan.x}px, ${pan.y}px) scale(${zoom})`;
  zoomLabel.textContent = `${Math.round(zoom * 100)}%`;
}
function resetZoom() { zoom = 1; pan = { x: 0, y: 0 }; applyTransform(); }

svgWrapper.addEventListener('wheel', e => {
  e.preventDefault();
  const rect = svgWrapper.getBoundingClientRect();
  const mx = e.clientX - rect.left - rect.width / 2;
  const my = e.clientY - rect.top  - rect.height / 2;
  const factor = e.deltaY < 0 ? 1.12 : 1 / 1.12;
  const newZoom = Math.max(0.1, Math.min(12, zoom * factor));
  pan.x = mx - (mx - pan.x) * (newZoom / zoom);
  pan.y = my - (my - pan.y) * (newZoom / zoom);
  zoom = newZoom; applyTransform();
}, { passive: false });

let dragging = false, dragStart = { x: 0, y: 0 }, panStart = { x: 0, y: 0 };
svgWrapper.addEventListener('mousedown', e => {
  if (e.button !== 0) return;
  e.preventDefault(); dragging = true;
  dragStart = { x: e.clientX, y: e.clientY }; panStart = { ...pan };
  svgWrapper.classList.add('dragging');
});
window.addEventListener('mousemove', e => {
  if (!dragging) return;
  pan.x = panStart.x + e.clientX - dragStart.x;
  pan.y = panStart.y + e.clientY - dragStart.y;
  applyTransform();
});
window.addEventListener('mouseup', () => { if (!dragging) return; dragging = false; svgWrapper.classList.remove('dragging'); });
svgWrapper.addEventListener('dblclick', resetZoom);
document.getElementById('zoom-reset-btn').addEventListener('click', resetZoom);

render();
</script>
</body>
</html>
