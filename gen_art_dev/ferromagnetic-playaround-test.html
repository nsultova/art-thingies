<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ferromagnetic Revelation</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.7.0/p5.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&family=Lora:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --anthropic-dark: #141413;
            --anthropic-light: #faf9f5;
            --anthropic-mid-gray: #b0aea5;
            --anthropic-light-gray: #e8e6dc;
            --anthropic-orange: #d97757;
            --anthropic-blue: #6a9bcc;
            --anthropic-green: #788c5d;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, var(--anthropic-light) 0%, #f5f3ee 100%);
            min-height: 100vh;
            color: var(--anthropic-dark);
        }

        .container {
            display: flex;
            min-height: 100vh;
            padding: 20px;
            gap: 20px;
        }

        .sidebar {
            width: 320px;
            flex-shrink: 0;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(20, 20, 19, 0.1);
            overflow-y: auto;
            overflow-x: hidden;
        }

        .sidebar h1 {
            font-family: 'Lora', serif;
            font-size: 21px;
            font-weight: 500;
            color: var(--anthropic-dark);
            margin-bottom: 8px;
            line-height: 1.25;
        }

        .sidebar .subtitle {
            color: var(--anthropic-mid-gray);
            font-size: 12px;
            margin-bottom: 28px;
            line-height: 1.5;
        }

        .control-section { margin-bottom: 28px; }

        .control-section h3 {
            font-size: 14px;
            font-weight: 600;
            color: var(--anthropic-dark);
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .control-section h3::before {
            content: '•';
            color: var(--anthropic-orange);
            font-weight: bold;
        }

        .seed-input {
            width: 100%;
            background: var(--anthropic-light);
            padding: 11px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            margin-bottom: 10px;
            border: 1px solid var(--anthropic-light-gray);
            text-align: center;
            color: var(--anthropic-dark);
        }

        .seed-input:focus {
            outline: none;
            border-color: var(--anthropic-orange);
            box-shadow: 0 0 0 2px rgba(217, 119, 87, 0.1);
            background: white;
        }

        .seed-controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 8px;
        }

        .control-group { margin-bottom: 16px; }

        .control-group label {
            display: block;
            font-size: 12px;
            font-weight: 500;
            color: var(--anthropic-dark);
            margin-bottom: 7px;
        }

        .slider-container { display: flex; align-items: center; gap: 10px; }

        .slider-container input[type="range"] {
            flex: 1;
            height: 4px;
            background: var(--anthropic-light-gray);
            border-radius: 2px;
            outline: none;
            -webkit-appearance: none;
            cursor: pointer;
        }

        .slider-container input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 15px;
            height: 15px;
            background: var(--anthropic-orange);
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .slider-container input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.15);
            background: #c86641;
        }

        .slider-container input[type="range"]::-moz-range-thumb {
            width: 15px;
            height: 15px;
            background: var(--anthropic-orange);
            border-radius: 50%;
            border: none;
            cursor: pointer;
        }

        .value-display {
            font-family: 'Courier New', monospace;
            font-size: 11px;
            color: var(--anthropic-mid-gray);
            min-width: 38px;
            text-align: right;
        }

        .checkbox-row {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 3px 0;
        }

        .checkbox-row input[type="checkbox"] {
            width: 15px;
            height: 15px;
            cursor: pointer;
            accent-color: var(--anthropic-orange);
        }

        .checkbox-row span {
            font-size: 12px;
            color: var(--anthropic-mid-gray);
        }

        .button {
            background: var(--anthropic-orange);
            color: white;
            border: none;
            padding: 10px 14px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 100%;
            font-family: 'Poppins', sans-serif;
        }

        .button:hover { background: #c86641; transform: translateY(-1px); }
        .button:active { transform: translateY(0); }
        .button.secondary { background: var(--anthropic-blue); }
        .button.secondary:hover { background: #5a8bb8; }
        .button.tertiary { background: var(--anthropic-green); }
        .button.tertiary:hover { background: #6b7b52; }

        .button-row { display: flex; gap: 8px; }
        .button-row .button { flex: 1; }

        .canvas-area {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 0;
        }

        #canvas-container {
            width: 100%;
            max-width: 1000px;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(6, 8, 18, 0.35);
            background: #060812;
        }

        #canvas-container canvas {
            display: block;
            width: 100% !important;
            height: auto !important;
        }

        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 400px;
            font-size: 14px;
            color: #4060a0;
            font-family: 'Poppins', sans-serif;
            background: #060812;
            letter-spacing: 0.05em;
        }

        @media (max-width: 700px) {
            .container { flex-direction: column; }
            .sidebar { width: 100%; }
        }
    </style>
</head>
<body>
<div class="container">

    <!-- ── Sidebar ── -->
    <div class="sidebar">
        <h1>Ferromagnetic Revelation</h1>
        <div class="subtitle">
            Invisible magnetic fields traced by ten thousand drifting particles —
            the geometry of force, made radiant.
        </div>

        <!-- Seed -->
        <div class="control-section">
            <h3>Seed</h3>
            <input type="number" id="seed-input" class="seed-input" value="12345" onchange="updateSeed()">
            <div class="seed-controls">
                <button class="button secondary" onclick="previousSeed()">← Prev</button>
                <button class="button secondary" onclick="nextSeed()">Next →</button>
            </div>
            <button class="button tertiary" style="margin-top:0" onclick="randomSeedAndUpdate()">↻ Random</button>
        </div>

        <!-- Parameters -->
        <div class="control-section">
            <h3>Parameters</h3>

            <div class="control-group">
                <label>Dipole Count</label>
                <div class="slider-container">
                    <input type="range" id="dipoleCount" min="1" max="6" step="1" value="3"
                        oninput="updateParam('dipoleCount', parseInt(this.value), true)">
                    <span class="value-display" id="dipoleCount-value">3</span>
                </div>
            </div>

            <div class="control-group">
                <label>Particle Count</label>
                <div class="slider-container">
                    <input type="range" id="particleCount" min="500" max="6000" step="250" value="2500"
                        oninput="updateParam('particleCount', parseInt(this.value), true)">
                    <span class="value-display" id="particleCount-value">2500</span>
                </div>
            </div>

            <div class="control-group">
                <label>Flow Speed</label>
                <div class="slider-container">
                    <input type="range" id="flowSpeed" min="0.3" max="3.5" step="0.1" value="1.2"
                        oninput="updateParam('flowSpeed', parseFloat(this.value), false)">
                    <span class="value-display" id="flowSpeed-value">1.2</span>
                </div>
            </div>

            <div class="control-group">
                <label>Particle Lifetime</label>
                <div class="slider-container">
                    <input type="range" id="particleLifetime" min="40" max="700" step="40" value="320"
                        oninput="updateParam('particleLifetime', parseInt(this.value), true)">
                    <span class="value-display" id="particleLifetime-value">320</span>
                </div>
            </div>

            <div class="control-group">
                <label>Field Strength</label>
                <div class="slider-container">
                    <input type="range" id="poleStrength" min="1" max="10" step="0.5" value="5"
                        oninput="updateParam('poleStrength', parseFloat(this.value), true)">
                    <span class="value-display" id="poleStrength-value">5</span>
                </div>
            </div>

            <div class="control-group">
                <label>Dipole Separation</label>
                <div class="slider-container">
                    <input type="range" id="dipSep" min="20" max="200" step="10" value="80"
                        oninput="updateParam('dipSep', parseInt(this.value), true)">
                    <span class="value-display" id="dipSep-value">80</span>
                </div>
            </div>

            <div class="control-group">
                <label>Trail Fade</label>
                <div class="slider-container">
                    <input type="range" id="trailFade" min="0" max="100" step="5" value="0"
                        oninput="updateParam('trailFade', parseInt(this.value), false)">
                    <span class="value-display" id="trailFade-value">0</span>
                </div>
            </div>

            <div class="control-group">
                <label>Show Poles</label>
                <div class="checkbox-row">
                    <input type="checkbox" id="showPoles" checked
                        onchange="updateParam('showPoles', this.checked, false)">
                    <span>Visible</span>
                </div>
            </div>
        </div>

        <!-- Actions -->
        <div class="control-section">
            <h3>Actions</h3>
            <div class="button-row" style="margin-bottom:8px">
                <button class="button" onclick="resetParameters()">Reset</button>
                <button class="button secondary" onclick="saveCanvas('ferromagnetic-'+params.seed,'png')">Save PNG</button>
            </div>
        </div>
    </div>

    <!-- ── Canvas ── -->
    <div class="canvas-area">
        <div id="canvas-container">
            <div class="loading">Initializing field simulation…</div>
        </div>
    </div>

</div>

<script>
// ═══════════════════════════════════════════════════════════════════════
// PARAMETERS
// ═══════════════════════════════════════════════════════════════════════

let params = {
    seed:            12345,
    dipoleCount:     3,
    particleCount:   2500,
    flowSpeed:       1.2,
    particleLifetime: 320,
    poleStrength:    5,
    dipSep:          80,   // half-separation between N and S within each dipole
    trailFade:       0,
    showPoles:       true
};

const defaultParams = { ...params };

// ═══════════════════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════════════════

let poles     = [];
let particles = [];

// ═══════════════════════════════════════════════════════════════════════
// PHYSICS — Inverse-square magnetic monopole superposition
// ═══════════════════════════════════════════════════════════════════════

function getActualStrength() {
    // Exponential mapping: slider 1→10 gives a large dynamic range
    return Math.pow(params.poleStrength, 2.8) * 500;
}

// Magnetic field vector at world position (x, y)
// B = sum_i  q_i * (r⃗_i / |r_i|³)
function fieldAt(x, y) {
    let bx = 0, by = 0;
    const S       = getActualStrength();
    const minDist = 24;          // clamped minimum distance (prevents singularity)

    for (let i = 0; i < poles.length; i++) {
        const p  = poles[i];
        const dx = x - p.x;
        const dy = y - p.y;
        const r  = Math.sqrt(dx * dx + dy * dy);
        const rs = r < minDist ? minDist : r; // rSafe
        const f  = (p.strength * S) / (rs * rs * rs);
        bx += dx * f;
        by += dy * f;
    }

    return { x: bx, y: by, mag: Math.sqrt(bx * bx + by * by) };
}

// ═══════════════════════════════════════════════════════════════════════
// COLOR — HSB→RGB + log-mapped field-strength palette
// ═══════════════════════════════════════════════════════════════════════

function hsbToRgb(h, s, b) {
    // h: 0-360  s: 0-100  b: 0-100
    const S  = s / 100, B = b / 100;
    const H  = h / 60;
    const C  = B * S;
    const X  = C * (1 - Math.abs(H % 2 - 1));
    const m  = B - C;
    let r = 0, g = 0, bv = 0;
    if      (H < 1) { r = C; g = X;  bv = 0; }
    else if (H < 2) { r = X; g = C;  bv = 0; }
    else if (H < 3) { r = 0; g = C;  bv = X; }
    else if (H < 4) { r = 0; g = X;  bv = C; }
    else if (H < 5) { r = X; g = 0;  bv = C; }
    else            { r = C; g = 0;  bv = X; }
    return {
        r: Math.round((r  + m) * 255),
        g: Math.round((g  + m) * 255),
        b: Math.round((bv + m) * 255)
    };
}

function lv(a, b, t) { return a + (b - a) * t; }  // linear interpolate

/**
 * Map normalised field strength [0,1] and age factor [0→old, 1→young]
 * to an RGBA colour object (values 0-255).
 *
 * Palette arc (cold dark → electric blue → cyan → warm gold → hot orange):
 *   t=0.00  deep indigo     barely visible
 *   t=0.25  violet          faint but present
 *   t=0.50  electric blue   vivid mid-tone
 *   t=0.70  bright cyan     full luminance
 *   t=0.87  warm gold       near-pole intensity
 *   t=1.00  hot orange      pole proximity
 */
function fieldToColor(t, ageFactor) {
    let h, s, bri;

    if (t < 0.25) {
        const tt = t / 0.25;
        h   = lv(246, 265, tt);
        s   = lv(72,  78,  tt);
        bri = lv(11,  42,  tt);
    } else if (t < 0.50) {
        const tt = (t - 0.25) / 0.25;
        h   = lv(265, 218, tt);
        s   = lv(78,  95,  tt);
        bri = lv(42,  78,  tt);
    } else if (t < 0.70) {
        const tt = (t - 0.50) / 0.20;
        h   = lv(218, 190, tt);
        s   = lv(95,  82,  tt);
        bri = lv(78,  93,  tt);
    } else if (t < 0.87) {
        const tt = (t - 0.70) / 0.17;
        h   = lv(190, 46,  tt);
        s   = lv(82,  94,  tt);
        bri = lv(93,  100, tt);
    } else {
        const tt = (t - 0.87) / 0.13;
        h   = lv(46,  22,  tt);
        s   = lv(94,  62,  tt);
        bri = lv(100, 100, tt);
    }

    const rgb = hsbToRgb(h, s, bri);

    // Alpha: quadratic age fade (young = opaque) × quadratic field boost (weak = transparent)
    const maxA      = 95;
    const ageA      = ageFactor * ageFactor * maxA;
    const fieldBoost = Math.max(0.06, t * t);
    const a          = Math.round(ageA * fieldBoost);

    return { r: rgb.r, g: rgb.g, b: rgb.b, a };
}

// ═══════════════════════════════════════════════════════════════════════
// PARTICLE
// ═══════════════════════════════════════════════════════════════════════

class MagneticParticle {
    constructor(stagger) {
        this.x = this.y = this.prevX = this.prevY = 0;
        this.age = this.maxAge = 0;
        this.fieldMag = 0;
        this.reset(stagger);
    }

    reset(stagger) {
        this.x = random(0, width);
        this.y = random(0, height);
        this.prevX = this.x;
        this.prevY = this.y;
        this.maxAge = params.particleLifetime +
                      floor(random(-params.particleLifetime * 0.35,
                                    params.particleLifetime * 0.35));
        this.age = stagger ? floor(random(this.maxAge)) : 0;
        this.fieldMag = 0;
    }

    update() {
        this.prevX = this.x;
        this.prevY = this.y;

        const f = fieldAt(this.x, this.y);
        this.fieldMag = f.mag;

        if (f.mag > 0.0001) {
            const inv = params.flowSpeed / f.mag;
            this.x += f.x * inv;
            this.y += f.y * inv;
        }

        this.age++;

        if (this.age >= this.maxAge ||
            this.x < -15 || this.x > width  + 15 ||
            this.y < -15 || this.y > height + 15) {
            this.reset(false);
        }
    }

    draw() {
        // Map field magnitude to normalised t using log scale
        // (captures the huge dynamic range: pole proximity vs far field)
        const S          = getActualStrength();
        const refStr     = S / (24 * 24 * 24);   // field magnitude at minDist from a unit pole
        const logMag     = Math.log(1 + this.fieldMag / refStr * 60);
        const logMax     = Math.log(61);
        const t          = Math.min(logMag / logMax, 1.0);

        const ageFactor  = 1.0 - this.age / this.maxAge;
        const c          = fieldToColor(t, ageFactor);

        if (c.a < 2) return;   // skip near-invisible lines

        stroke(c.r, c.g, c.b, c.a);
        strokeWeight(0.9);
        line(this.prevX, this.prevY, this.x, this.y);
    }
}

// ═══════════════════════════════════════════════════════════════════════
// POLE RENDERING
// ═══════════════════════════════════════════════════════════════════════

function drawPoles() {
    if (!params.showPoles) return;

    noStroke();
    textAlign(CENTER, CENTER);
    textSize(11);

    for (const pole of poles) {
        const isN = pole.strength > 0;
        const cx  = pole.x, cy = pole.y;

        // Aura — concentric transparent glows
        for (let r = 40; r > 0; r -= 5) {
            const a = Math.round(map(r, 0, 40, 70, 0));
            if (isN) fill(255, 150, 55, a);
            else     fill(55,  155, 255, a);
            ellipse(cx, cy, r * 2, r * 2);
        }

        // Core dot
        if (isN) fill(255, 190, 90, 230);
        else     fill(90,  195, 255, 230);
        ellipse(cx, cy, 13, 13);

        // Label
        fill(230, 235, 255, 175);
        noStroke();
        text(isN ? 'N' : 'S', cx, cy - 24);
    }
}

// ═══════════════════════════════════════════════════════════════════════
// P5.JS LIFECYCLE
// ═══════════════════════════════════════════════════════════════════════

function setup() {
    const canvas = createCanvas(1200, 1200);
    canvas.parent('canvas-container');
    document.querySelector('.loading').style.display = 'none';
    initializeSystem();
}

function initializeSystem() {
    randomSeed(params.seed);
    noiseSeed(params.seed);

    // The void — near-black deep-space blue
    background(6, 8, 18);

    // ── Generate dipoles with minimum centre-to-centre spacing ──
    poles = [];
    const margin         = 180;
    const minDipoleSpacing = 230;
    let   attempts       = 0;

    while (poles.length / 2 < params.dipoleCount && attempts < 300) {
        const cx = random(margin, width  - margin);
        const cy = random(margin, height - margin);

        // Reject if too close to any existing dipole centre
        let tooClose = false;
        for (let i = 0; i < poles.length; i += 2) {
            const midX = (poles[i].x + poles[i + 1].x) * 0.5;
            const midY = (poles[i].y + poles[i + 1].y) * 0.5;
            const dx   = cx - midX, dy = cy - midY;
            if (Math.sqrt(dx * dx + dy * dy) < minDipoleSpacing) {
                tooClose = true;
                break;
            }
        }

        if (!tooClose) {
            const angle = random(TWO_PI);
            const hs    = params.dipSep * 0.5;           // half-separation
            const str   = random(0.80, 1.20);

            poles.push({ x: cx + cos(angle) * hs, y: cy + sin(angle) * hs,  strength:  str });
            poles.push({ x: cx - cos(angle) * hs, y: cy - sin(angle) * hs,  strength: -str });
        }
        attempts++;
    }

    // ── Spawn particles, staggered so canvas fills immediately ──
    particles = [];
    for (let i = 0; i < params.particleCount; i++) {
        particles.push(new MagneticParticle(true));
    }
}

function draw() {
    // Optional fade overlay — erodes old trails, creates flowing dynamism
    if (params.trailFade > 0) {
        const a = Math.round(map(params.trailFade, 0, 100, 0, 30));
        noStroke();
        fill(6, 8, 18, a);
        rect(0, 0, width, height);
    }

    // Advance and paint every particle (accumulation — no canvas clear)
    noStroke();
    for (let i = 0; i < particles.length; i++) {
        particles[i].update();
        particles[i].draw();
    }

    // Pole markers drawn on top each frame so they remain crisp
    drawPoles();
}

// ═══════════════════════════════════════════════════════════════════════
// UI HANDLERS
// ═══════════════════════════════════════════════════════════════════════

function updateParam(name, value, needsReinit) {
    params[name] = value;
    const el = document.getElementById(name + '-value');
    if (el) el.textContent = value;
    if (needsReinit) initializeSystem();
}

function updateSeedDisplay() {
    document.getElementById('seed-input').value = params.seed;
}

function updateSeed() {
    const raw = parseInt(document.getElementById('seed-input').value);
    if (raw && raw > 0) { params.seed = raw; initializeSystem(); }
    else                { updateSeedDisplay(); }
}

function previousSeed() {
    params.seed = Math.max(1, params.seed - 1);
    updateSeedDisplay();
    initializeSystem();
}

function nextSeed() {
    params.seed++;
    updateSeedDisplay();
    initializeSystem();
}

function randomSeedAndUpdate() {
    params.seed = Math.floor(Math.random() * 999999) + 1;
    updateSeedDisplay();
    initializeSystem();
}

function resetParameters() {
    Object.assign(params, defaultParams);

    // Sync all controls
    ['dipoleCount','particleCount','flowSpeed','particleLifetime',
     'poleStrength','dipSep','trailFade'].forEach(k => {
        const el = document.getElementById(k);
        if (el) el.value = params[k];
        const vEl = document.getElementById(k + '-value');
        if (vEl) vEl.textContent = params[k];
    });
    document.getElementById('showPoles').checked = params.showPoles;

    updateSeedDisplay();
    initializeSystem();
}

window.addEventListener('load', updateSeedDisplay);
</script>
</body>
</html>
