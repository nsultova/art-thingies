<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coiled Tendrils — Generative Art</title>
  <style>
    :root {
      --bg:         #0c0c0c;
      --surface:    #161616;
      --surface2:   #202020;
      --border:     #2e2e2e;
      --text:       #c8c8c8;
      --text-dim:   #555;
      --accent:     #5ecec6;
      --accent-dim: #1d4d4a;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', monospace;
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ─────────────────────────────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 11px 18px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    header h1 {
      font-size: 14px;
      font-weight: 600;
      color: var(--accent);
      letter-spacing: 0.06em;
    }

    header .subtitle {
      font-size: 12px;
      color: var(--text-dim);
    }

    /* ── Layout ─────────────────────────────────────────────────────── */
    .layout {
      display: flex;
      flex: 1;
      min-height: 0;
      overflow: hidden;
    }

    /* ── Controls sidebar ───────────────────────────────────────────── */
    .controls {
      width: 295px;
      flex-shrink: 0;
      overflow-y: auto;
      border-right: 1px solid var(--border);
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    .group {
      border: 1px solid var(--border);
      border-radius: 5px;
    }

    .group-header {
      padding: 6px 10px;
      background: var(--surface2);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.10em;
      text-transform: uppercase;
      color: var(--text-dim);
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      user-select: none;
      transition: color 0.15s;
      border-radius: 4px 4px 0 0;
    }

    .group-header:hover { color: var(--text); }

    .group.collapsed .group-header { border-radius: 4px; }
    .group.collapsed .caret { transform: rotate(-90deg); }
    .group.collapsed .group-body { display: none; }

    .caret { display: inline-block; transition: transform 0.18s; }

    .group-body {
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      overflow-y: auto;
      max-height: 260px;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
      border-radius: 0 0 4px 4px;
    }

    /* ── Individual parameter ───────────────────────────────────────── */
    .param { display: flex; flex-direction: column; gap: 3px; }

    .param-label {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      font-size: 12px;
    }

    .param-name { color: var(--text); }

    .param-value {
      color: var(--accent);
      font-size: 11px;
      min-width: 36px;
      text-align: right;
    }

    /* Range slider */
    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 2px;
      background: var(--border);
      border-radius: 1px;
      outline: none;
      cursor: pointer;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 11px;
      height: 11px;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }

    input[type="range"]::-webkit-slider-thumb:hover {
      background: #fff;
      transform: scale(1.2);
    }

    input[type="range"]::-moz-range-thumb {
      width: 11px;
      height: 11px;
      border: none;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
    }

    /* ── Preview area ───────────────────────────────────────────────── */
    .preview {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--bg);
    }

    .svg-wrapper {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      overflow: hidden;
      cursor: grab;
      user-select: none;
    }

    .svg-wrapper.dragging { cursor: grabbing; }

    #zoom-layer {
      transform-origin: center center;
      flex-shrink: 0;
    }

    #canvas {
      background: #fff;
      border-radius: 2px;
      box-shadow: 0 4px 48px rgba(0, 0, 0, 0.75);
      display: block;
      flex-shrink: 0;
    }

    /* ── Canvas preset buttons ──────────────────────────────────────── */
    .preset-row {
      display: flex;
      gap: 5px;
      margin-bottom: 2px;
    }

    .preset-btn {
      flex: 1;
      padding: 4px 6px;
      font-size: 11px;
      min-width: 0;
    }

    .preset-btn.active {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-dim);
    }

    /* ── Zoom indicator ─────────────────────────────────────────────── */
    #zoom-label {
      font-size: 11px;
      color: var(--text-dim);
      min-width: 38px;
    }

    /* ── Toolbar ────────────────────────────────────────────────────── */
    .toolbar {
      border-top: 1px solid var(--border);
      padding: 9px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
      flex-wrap: wrap;
    }

    .seed-label {
      font-size: 11px;
      color: var(--text-dim);
    }

    #seed-input {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: inherit;
      font-size: 12px;
      padding: 5px 8px;
      border-radius: 4px;
      width: 90px;
      outline: none;
      transition: border-color 0.15s;
    }

    #seed-input:focus { border-color: var(--accent); }

    button {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: inherit;
      font-size: 12px;
      padding: 6px 14px;
      border-radius: 4px;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
      white-space: nowrap;
    }

    button:hover { border-color: var(--accent); color: var(--accent); }

    #download-btn {
      background: var(--accent-dim);
      border-color: var(--accent);
      color: var(--accent);
      margin-left: auto;
    }

    #download-btn:hover { background: var(--accent); color: #000; }

    .render-time {
      font-size: 10px;
      color: var(--text-dim);
    }
  </style>

<body>

<header>
  <h1>COILED TENDRILS</h1>
  <span class="subtitle">ribbed spiral tubes &mdash; generative plotter art</span>
</header>

<div class="layout">
  <aside class="controls" id="controls"></aside>

  <main class="preview">
    <div class="svg-wrapper" id="svg-wrapper">
      <div id="zoom-layer">
        <svg id="canvas" xmlns="http://www.w3.org/2000/svg"></svg>
      </div>
    </div>

    <div class="toolbar">
      <span class="seed-label">seed</span>
      <input type="number" id="seed-input" value="42" min="0" max="99999999">
      <button id="randomize-btn">&#9889; randomize</button>
      <button id="rerender-btn">&#8634; re-render</button>
      <span class="render-time" id="render-time"></span>
      <button id="zoom-reset-btn">&#8857; reset zoom</button>
      <span id="zoom-label">100%</span>
      <button id="download-btn">&#8595; save SVG</button>
    </div>
  </main>
</div>

<script>
// ════════════════════════════════════════════════════════════════════
//  BOILERPLATE — do not modify below unless you know what you're doing
// ════════════════════════════════════════════════════════════════════

// ── Seeded PRNG (mulberry32) ─────────────────────────────────────────
function makePRNG(seed) {
  let s = seed >>> 0;
  const rand = () => {
    s = (s + 0x6D2B79F5) >>> 0;
    let t = Math.imul(s ^ (s >>> 15), 1 | s);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 0x100000000;
  };
  rand.uniform = (a, b) => a + rand() * (b - a);
  rand.gauss = () => {
    const u = Math.max(rand(), 1e-12);
    return Math.sqrt(-2 * Math.log(u)) * Math.cos(2 * Math.PI * rand());
  };
  return rand;
}

// ════════════════════════════════════════════════════════════════════
//  SCHEMA
// ════════════════════════════════════════════════════════════════════
const ARTWORK_NAME = 'coiled-tendrils';

const SCHEMA = [
  {
    group: 'Canvas',
    presets: [
      { label: 'A4',     w: 210, h: 297 },
      { label: 'A3',     w: 297, h: 420 },
      { label: 'Square', w: 200, h: 200 },
    ],
    items: [
      { id: 'width',  label: 'Width (mm)',  min: 60,  max: 420, step: 5, def: 210 },
      { id: 'height', label: 'Height (mm)', min: 60,  max: 594, step: 5, def: 297 },
    ],
  },
  {
    group: 'Spiral',
    items: [
      { id: 'spiralCxPct',   label: 'Center X %',     min: 0.1, max: 0.9, step: 0.01, def: 0.45 },
      { id: 'spiralCyPct',   label: 'Center Y %',     min: 0.1, max: 0.9, step: 0.01, def: 0.62 },
      { id: 'spiralTurns',   label: 'Turns',           min: 2,   max: 15,  step: 1,    def: 7 },
      { id: 'spiralSpacing', label: 'Arm spacing',     min: 1.0, max: 6.0, step: 0.1,  def: 2.8 },
    ],
  },
  {
    group: 'Tendrils',
    items: [
      { id: 'numTendrils',    label: 'Count',              min: 1,   max: 30,   step: 1,    def: 14 },
      { id: 'tendrilLength',  label: 'Length',             min: 40,  max: 400,  step: 5,    def: 180 },
      { id: 'curvatureStr',   label: 'Curvature strength', min: 0.01, max: 0.12, step: 0.005, def: 0.04 },
      { id: 'curvatureSmooth', label: 'Curvature smooth',  min: 2,   max: 30,   step: 1,    def: 12 },
      { id: 'angleSpread',    label: 'Angle spread',       min: 0.1, max: 2.0,  step: 0.05, def: 0.60 },
    ],
  },
  {
    group: 'Tubes',
    items: [
      { id: 'tubeWidth',      label: 'Width',           min: 1.0, max: 15.0, step: 0.5,  def: 5.0 },
      { id: 'hatchSpacing',   label: 'Hatch spacing',   min: 0.2, max: 2.0,  step: 0.05, def: 0.60 },
      { id: 'widthVariation', label: 'Width variation',  min: 0.0, max: 0.8,  step: 0.05, def: 0.40 },
      { id: 'taper',          label: 'Taper',            min: 0.0, max: 0.4,  step: 0.01, def: 0.15 },
    ],
  },
];

// ════════════════════════════════════════════════════════════════════
//  BOILERPLATE: state, controls builder, helpers
// ════════════════════════════════════════════════════════════════════
const state = {};
SCHEMA.forEach(g => g.items.forEach(p => { state[p.id] = p.def; }));

const controlsEl = document.getElementById('controls');
const sliders    = {};
const valEls     = {};
let   presetBtns = [];

SCHEMA.forEach(({ group, items, presets }) => {
  const groupEl = document.createElement('div');
  groupEl.className = 'group';

  const hdr = document.createElement('div');
  hdr.className = 'group-header';
  hdr.innerHTML = `${group} <span class="caret">&#9662;</span>`;
  hdr.addEventListener('click', () => groupEl.classList.toggle('collapsed'));

  const body = document.createElement('div');
  body.className = 'group-body';

  if (presets) {
    const row = document.createElement('div');
    row.className = 'preset-row';
    presets.forEach(({ label, w, h }) => {
      const btn = document.createElement('button');
      btn.className = 'preset-btn';
      btn.textContent = label;
      presetBtns.push({ btn, w, h });
      btn.addEventListener('click', () => {
        state.width  = w;  state.height = h;
        sliders.width.value  = w; sliders.height.value = h;
        valEls.width.textContent  = String(w);
        valEls.height.textContent = String(h);
        updateActivePreset();
        render();
      });
      row.appendChild(btn);
    });
    body.appendChild(row);
  }

  items.forEach(param => {
    const wrap   = document.createElement('div');
    wrap.className = 'param';
    const row    = document.createElement('div');
    row.className = 'param-label';
    const nameEl = document.createElement('span');
    nameEl.className = 'param-name';
    nameEl.textContent = param.label;
    const valEl  = document.createElement('span');
    valEl.className = 'param-value';
    valEl.id = `val-${param.id}`;
    valEl.textContent = formatVal(param.def, param.step);
    valEls[param.id] = valEl;
    row.append(nameEl, valEl);

    const slider = document.createElement('input');
    slider.type = 'range';
    slider.min = param.min; slider.max = param.max; slider.step = param.step;
    slider.value = param.def;
    sliders[param.id] = slider;

    slider.addEventListener('input', () => {
      const v = parseFloat(slider.value);
      state[param.id] = v;
      valEl.textContent = formatVal(v, param.step);
      if (param.id === 'width' || param.id === 'height') updateActivePreset();
      scheduleRender();
    });

    wrap.append(row, slider);
    body.append(wrap);
  });

  groupEl.append(hdr, body);
  controlsEl.append(groupEl);
});

function updateActivePreset() {
  presetBtns.forEach(({ btn, w, h }) => {
    btn.classList.toggle('active', state.width === w && state.height === h);
  });
}
updateActivePreset();

function formatVal(v, step) {
  if (step >= 1) return String(Math.round(v));
  const decimals = String(step).split('.')[1]?.length ?? 2;
  return v.toFixed(Math.min(decimals, 3));
}

// ── SVG helpers ──────────────────────────────────────────────────────
const NS    = 'http://www.w3.org/2000/svg';
const svgEl = document.getElementById('canvas');

function svgEl_(tag, attrs) {
  const e = document.createElementNS(NS, tag);
  for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
  return e;
}

// ════════════════════════════════════════════════════════════════════
//  render() — Coiled Tendrils algorithm
// ════════════════════════════════════════════════════════════════════

function smoothArray(data, window) {
  if (window < 2) return data.slice();
  const result = [];
  for (let i = 0; i < data.length; i++) {
    const lo = Math.max(0, i - window);
    const hi = Math.min(data.length, i + window + 1);
    let sum = 0;
    for (let j = lo; j < hi; j++) sum += data[j];
    result.push(sum / (hi - lo));
  }
  return result;
}

function generateSpiralPath(cx, cy, turns, spacing) {
  const maxTheta = turns * 2 * Math.PI;
  const steps = Math.floor(maxTheta / 0.02);
  const points = [];
  for (let i = 0; i <= steps; i++) {
    const theta = (i / steps) * maxTheta;
    const r = spacing * theta / (2 * Math.PI);
    points.push([cx + r * Math.cos(theta), cy + r * Math.sin(theta)]);
  }
  return points;
}

function generateTendrilPath(sx, sy, startAngle, length, curvatureStr, curvatureSmooth, rand) {
  const stepSize = 0.5;
  const numSteps = Math.floor(length / stepSize);
  const rawNoise = [];
  for (let i = 0; i < numSteps; i++) rawNoise.push(rand() * 2 - 1);
  const smoothed = smoothArray(rawNoise, curvatureSmooth);

  const points = [[sx, sy]];
  let angle = startAngle;
  let x = sx, y = sy;
  for (let i = 0; i < numSteps; i++) {
    angle += smoothed[i] * curvatureStr;
    x += stepSize * Math.cos(angle);
    y += stepSize * Math.sin(angle);
    points.push([x, y]);
  }
  return points;
}

function drawRibbedTube(path, tubeWidth, hatchSpacing, taper, ox, oy) {
  if (path.length < 3) return;
  const lines = [];
  let accum = 0;

  for (let i = 1; i < path.length - 1; i++) {
    const [px, py] = path[i];
    const [prevX, prevY] = path[i - 1];
    const dx = px - prevX;
    const dy = py - prevY;
    accum += Math.sqrt(dx * dx + dy * dy);

    if (accum < hatchSpacing) continue;
    accum = 0;

    const ni = Math.min(i + 1, path.length - 1);
    const [nextX, nextY] = path[ni];
    let tx = nextX - prevX;
    let ty = nextY - prevY;
    const tLen = Math.sqrt(tx * tx + ty * ty);
    if (tLen < 1e-8) continue;
    tx /= tLen;
    ty /= tLen;

    // Normal
    const nx = -ty, ny = tx;

    // Taper
    const t = i / path.length;
    let taperFactor = 1.0;
    if (t < taper) taperFactor = t / taper;
    else if (t > 1.0 - taper) taperFactor = (1.0 - t) / taper;
    taperFactor = Math.max(0.05, taperFactor);

    const halfW = tubeWidth * 0.5 * taperFactor;

    const x1 = px + nx * halfW + ox;
    const y1 = py + ny * halfW + oy;
    const x2 = px - nx * halfW + ox;
    const y2 = py - ny * halfW + oy;

    lines.push({ x1, y1, x2, y2 });
  }
  return lines;
}

function render() {
  const t0   = performance.now();
  const p    = state;
  const seed = Math.max(0, parseInt(document.getElementById('seed-input').value) || 0);
  const rand = makePRNG(seed);

  // ── Canvas setup ─────────────────────────────────────────────────
  const margin = 2;
  const vw = p.width  + 2 * margin;
  const vh = p.height + 2 * margin;
  const ox = margin, oy = margin;

  svgEl.setAttribute('viewBox', `0 0 ${vw} ${vh}`);
  while (svgEl.firstChild) svgEl.removeChild(svgEl.lastChild);

  // ── Algorithm ────────────────────────────────────────────────────
  const spiralCx = p.width * p.spiralCxPct;
  const spiralCy = p.height * p.spiralCyPct;

  // 1. Central spiral
  const spiral = generateSpiralPath(spiralCx, spiralCy, p.spiralTurns, p.spiralSpacing);
  const spiralLines = drawRibbedTube(spiral, p.tubeWidth * 0.7, p.hatchSpacing, p.taper, ox, oy);

  // Batch all lines into a single path for performance
  let pathData = '';

  if (spiralLines) {
    for (const l of spiralLines) {
      pathData += `M${l.x1.toFixed(2)},${l.y1.toFixed(2)}L${l.x2.toFixed(2)},${l.y2.toFixed(2)}`;
    }
  }

  // 2. Tendrils
  const spiralLen = spiral.length;
  const spawnStart = Math.floor(spiralLen * 0.4);

  for (let ti = 0; ti < p.numTendrils; ti++) {
    const spawnFrac = rand();
    let spawnI = spawnStart + Math.floor(spawnFrac * (spiralLen - spawnStart - 2));
    spawnI = Math.min(spawnI, spiralLen - 2);

    const [sx, sy] = spiral[spawnI];
    const [nxPt, nyPt] = spiral[spawnI + 1];
    const [pxPt, pyPt] = spiral[Math.max(0, spawnI - 1)];
    const tangAngle = Math.atan2(nyPt - pyPt, nxPt - pxPt);

    const angleOffset = rand.uniform(-p.angleSpread, p.angleSpread);
    const startAngle = tangAngle + angleOffset;

    const length = p.tendrilLength * rand.uniform(0.5, 1.5);
    const tw = p.tubeWidth * rand.uniform(1.0 - p.widthVariation, 1.0 + p.widthVariation);

    const tendrilPath = generateTendrilPath(sx, sy, startAngle, length, p.curvatureStr, p.curvatureSmooth, rand);
    const lines = drawRibbedTube(tendrilPath, tw, p.hatchSpacing, p.taper, ox, oy);
    if (lines) {
      for (const l of lines) {
        pathData += `M${l.x1.toFixed(2)},${l.y1.toFixed(2)}L${l.x2.toFixed(2)},${l.y2.toFixed(2)}`;
      }
    }
  }

  // Draw everything as a single path element for performance
  if (pathData) {
    svgEl.appendChild(svgEl_('path', {
      d: pathData,
      stroke: 'black',
      'stroke-width': '0.5',
      fill: 'none',
      'stroke-linecap': 'round',
    }));
  }

  // ── Finish ───────────────────────────────────────────────────────
  fitSvg();
  document.getElementById('render-time').textContent =
    `${(performance.now() - t0).toFixed(1)} ms`;
}

// ════════════════════════════════════════════════════════════════════
//  BOILERPLATE: fit, zoom/pan, toolbar — do not modify
// ════════════════════════════════════════════════════════════════════
const wrapper = document.querySelector('.svg-wrapper');

function fitSvg() {
  const vbAttr = svgEl.getAttribute('viewBox');
  if (!vbAttr) return;
  const [, , vw, vh] = vbAttr.split(' ').map(Number);
  const pad = 24;
  const availW = wrapper.clientWidth  - pad * 2;
  const availH = wrapper.clientHeight - pad * 2;
  const aspect = vw / vh;
  let displayW, displayH;
  if (availW / availH > aspect) {
    displayH = availH; displayW = availH * aspect;
  } else {
    displayW = availW; displayH = availW / aspect;
  }
  svgEl.style.width  = `${Math.floor(displayW)}px`;
  svgEl.style.height = `${Math.floor(displayH)}px`;
}

new ResizeObserver(fitSvg).observe(wrapper);

let timer = null;
function scheduleRender() { clearTimeout(timer); timer = setTimeout(render, 55); }

document.getElementById('randomize-btn').addEventListener('click', () => {
  document.getElementById('seed-input').value = Math.floor(Math.random() * 9_999_999);
  render();
});

document.getElementById('rerender-btn').addEventListener('click', render);
document.getElementById('seed-input').addEventListener('change', render);
document.getElementById('seed-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') render();
});

document.getElementById('download-btn').addEventListener('click', () => {
  const seed  = document.getElementById('seed-input').value;
  const clone = svgEl.cloneNode(true);
  clone.setAttribute('width',  `${state.width  + 4}mm`);
  clone.setAttribute('height', `${state.height + 4}mm`);
  const bg = document.createElementNS(NS, 'rect');
  bg.setAttribute('width', '100%'); bg.setAttribute('height', '100%');
  bg.setAttribute('fill', 'white');
  clone.insertBefore(bg, clone.firstChild);
  clone.setAttribute('xmlns', NS);
  const blob = new Blob(
    [`<?xml version="1.0" encoding="UTF-8"?>\n<!-- ${ARTWORK_NAME} | seed=${seed} -->\n`, clone.outerHTML],
    { type: 'image/svg+xml' },
  );
  const a = document.createElement('a');
  a.href     = URL.createObjectURL(blob);
  a.download = `${ARTWORK_NAME}-s${seed}.svg`;
  a.click();
  URL.revokeObjectURL(a.href);
});

// Zoom & pan
const svgWrapper = document.getElementById('svg-wrapper');
const zoomLayer  = document.getElementById('zoom-layer');
const zoomLabel  = document.getElementById('zoom-label');
let zoom = 1, pan = { x: 0, y: 0 };

function applyTransform() {
  zoomLayer.style.transform = `translate(${pan.x}px, ${pan.y}px) scale(${zoom})`;
  zoomLabel.textContent = `${Math.round(zoom * 100)}%`;
}

function resetZoom() { zoom = 1; pan = { x: 0, y: 0 }; applyTransform(); }

svgWrapper.addEventListener('wheel', e => {
  e.preventDefault();
  const rect   = svgWrapper.getBoundingClientRect();
  const mx = e.clientX - rect.left - rect.width  / 2;
  const my = e.clientY - rect.top  - rect.height / 2;
  const factor  = e.deltaY < 0 ? 1.12 : 1 / 1.12;
  const newZoom = Math.max(0.1, Math.min(12, zoom * factor));
  pan.x = mx - (mx - pan.x) * (newZoom / zoom);
  pan.y = my - (my - pan.y) * (newZoom / zoom);
  zoom  = newZoom;
  applyTransform();
}, { passive: false });

let dragging = false, dragStart = { x: 0, y: 0 }, panStart = { x: 0, y: 0 };
svgWrapper.addEventListener('mousedown', e => {
  if (e.button !== 0) return;
  e.preventDefault();
  dragging = true;
  dragStart = { x: e.clientX, y: e.clientY };
  panStart  = { ...pan };
  svgWrapper.classList.add('dragging');
});
window.addEventListener('mousemove', e => {
  if (!dragging) return;
  pan.x = panStart.x + e.clientX - dragStart.x;
  pan.y = panStart.y + e.clientY - dragStart.y;
  applyTransform();
});
window.addEventListener('mouseup', () => {
  if (!dragging) return;
  dragging = false;
  svgWrapper.classList.remove('dragging');
});
svgWrapper.addEventListener('dblclick', resetZoom);
document.getElementById('zoom-reset-btn').addEventListener('click', resetZoom);

// Initial render
render();
</script>
</body>
</html>
